<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ThreatLoopHQ — AI Content Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f0f0f;color:#e8e6de;min-height:100vh}
.topbar{background:#1a1a18;border-bottom:1px solid #2a2a28;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10}
.logo{font-size:16px;font-weight:700;color:#ffe500}
.live{font-size:12px;color:#6b6b67;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{max-width:900px;margin:0 auto;padding:24px 16px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:#1a1a18;border:1px solid #2a2a28;border-radius:10px;padding:14px}
.stat-label{font-size:11px;color:#6b6b67;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-size:20px;font-weight:600}
.stat-sub{font-size:11px;color:#4a4a47;margin-top:3px}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;color:#6b6b67;border-radius:8px}
.tab:hover{background:#1a1a18}
.tab.active{background:#1a1a18;color:#e8e6de;font-weight:500;border:1px solid #2a2a28}
.panel{display:none}.panel.active{display:block}
.card{background:#1a1a18;border:1px solid #2a2a28;border-radius:12px;padding:16px;margin-bottom:10px}
.row{display:flex;align-items:center;gap:12px}
.thumb{width:80px;height:45px;background:#2a2a28;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#4a4a47;flex-shrink:0;font-weight:600}
.thumb.long{background:#1a3a2a;color:#4ade80}
.thumb.short{background:#1a1a3a;color:#60a5fa}
.vtitle{font-size:14px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:480px}
.vmeta{font-size:12px;color:#6b6b67}
.chips{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.chip{font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid #2a2a28;color:#6b6b67}
.chip a{color:#60a5fa;text-decoration:none}
.chip a:hover{text-decoration:underline}
.badge{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:500;white-space:nowrap}
.b-ok{background:#083522;color:#4ade80}
.b-fail{background:#3b1212;color:#f87171}
.b-pend{background:#2a2a28;color:#6b6b67}
.empty{font-size:13px;color:#4a4a47;padding:24px 0;text-align:center}
.err{background:#3b1212;border:1px solid #f87171;border-radius:8px;padding:8px 12px;font-size:12px;color:#f87171;margin-top:8px;font-family:monospace;word-break:break-all}
.refresh{font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid #2a2a28;background:#1a1a18;color:#e8e6de;cursor:pointer}
.refresh:hover{background:#2a2a28}
.section-title{font-size:11px;color:#6b6b67;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;font-weight:600}
.vtype-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;margin-left:6px}
.vtype-short{background:#0c2040;color:#60a5fa}
.vtype-long{background:#083522;color:#4ade80}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">⚡ ThreatLoopHQ — Content Dashboard</div>
  <div class="live">
    <span class="dot"></span>
    <span id="live-label">Loading...</span>
    <button class="refresh" onclick="loadStatus()">↺ Refresh</button>
  </div>
</div>

<div class="main">
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total posted</div>
      <div class="stat-val" id="s-total">—</div>
      <div class="stat-sub">all time</div>
    </div>
    <div class="stat">
      <div class="stat-label">Shorts posted</div>
      <div class="stat-val" id="s-shorts">—</div>
      <div class="stat-sub">60 sec videos</div>
    </div>
    <div class="stat">
      <div class="stat-label">Long form</div>
      <div class="stat-val" id="s-long">—</div>
      <div class="stat-sub">5-6 min videos</div>
    </div>
    <div class="stat">
      <div class="stat-label">Last run</div>
      <div class="stat-val" style="font-size:13px;margin-top:4px" id="s-last">—</div>
      <div class="stat-sub" id="s-status">—</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="sw('latest')">Latest</div>
    <div class="tab" onclick="sw('shorts')">Shorts</div>
    <div class="tab" onclick="sw('longform')">Long Form</div>
    <div class="tab" onclick="sw('all')">All Videos</div>
  </div>

  <div class="panel active" id="tab-latest">
    <div id="latest-cards" class="empty">Loading...</div>
  </div>
  <div class="panel" id="tab-shorts">
    <div id="shorts-list" class="empty">Loading...</div>
  </div>
  <div class="panel" id="tab-longform">
    <div id="long-list" class="empty">Loading...</div>
  </div>
  <div class="panel" id="tab-all">
    <div id="all-list" class="empty">Loading...</div>
  </div>
</div>

<script>
function sw(id){
  document.querySelectorAll('.tab').forEach((t,i)=>
    t.classList.toggle('active',['latest','shorts','longform','all'][i]===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
}

function ago(d){
  if(!d) return '—';
  const diff=Math.floor((Date.now()-new Date(d.replace(' UTC','Z')))/1000);
  if(diff<60) return 'just now';
  if(diff<3600) return Math.floor(diff/60)+'m ago';
  if(diff<86400) return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}

function badge(s){
  const m={'success':'b-ok ✅ Success','failed':'b-fail ❌ Failed','pending':'b-pend ⏳ Pending'};
  const v=m[s]||'b-pend Unknown';
  const [cls,...rest]=v.split(' ');
  return `<span class="badge ${cls}">${rest.join(' ')}</span>`;
}

function card(item){
  const isLong = item.video_type === 'long_form';
  const thumbLabel = isLong ? '🎬 LONG' : '📱 SHORT';
  const thumbClass = isLong ? 'long' : 'short';
  const vtypeBadge = isLong
    ? '<span class="vtype-badge vtype-long">5-6 MIN</span>'
    : '<span class="vtype-badge vtype-short">60 SEC</span>';
  const yt = item.youtube_url
    ? `<span class="chip"><a href="${item.youtube_url}" target="_blank">▶ YouTube</a></span>` : '';
  const ig = item.instagram_url
    ? `<span class="chip"><a href="${item.instagram_url}" target="_blank">📸 Instagram</a></span>` : '';
  const pillar = item.pillar
    ? `<span class="chip">${item.pillar}</span>` : '';
  const err = item.error
    ? `<div class="err">${item.error}</div>` : '';
  return `<div class="card">
    <div class="row">
      <div class="thumb ${thumbClass}">${thumbLabel}</div>
      <div style="flex:1;min-width:0">
        <div class="vtitle">${item.topic||'Untitled'}${vtypeBadge}</div>
        <div class="vmeta">${item.last_run||''} · ${ago(item.last_run)}</div>
        <div class="chips">${pillar}${yt}${ig}</div>
      </div>
      ${badge(item.status)}
    </div>${err}
  </div>`;
}

async function loadStatus(){
  try{
    const r = await fetch('./status.json?t='+Date.now());
    if(!r.ok) throw new Error('status.json not found — run the pipeline first');
    const d = await r.json();
    const h = d.history||[];

    const ok     = h.filter(x=>x.status==='success');
    const shorts = ok.filter(x=>x.video_type==='short'||!x.video_type);
    const longs  = ok.filter(x=>x.video_type==='long_form');

    document.getElementById('s-total').textContent  = ok.length;
    document.getElementById('s-shorts').textContent = shorts.length;
    document.getElementById('s-long').textContent   = longs.length;
    document.getElementById('s-last').textContent   = ago(d.last_run);
    document.getElementById('s-status').innerHTML   = badge(d.status);
    document.getElementById('live-label').textContent =
      d.status==='success' ? 'Auto-posting active' : 'Last: '+d.status;

    // Latest — last 4 videos
    const latest = h.slice(0,4);
    document.getElementById('latest-cards').innerHTML =
      latest.length ? latest.map(card).join('') :
      '<div class="empty">No videos yet. Trigger the pipeline to get started.</div>';

    // Shorts only
    const shortItems = h.filter(x=>x.video_type==='short'||!x.video_type);
    document.getElementById('shorts-list').innerHTML =
      shortItems.length ? shortItems.map(card).join('') :
      '<div class="empty">No shorts yet.</div>';

    // Long form only
    const longItems = h.filter(x=>x.video_type==='long_form');
    document.getElementById('long-list').innerHTML =
      longItems.length ? longItems.map(card).join('') :
      '<div class="empty">No long form videos yet.</div>';

    // All
    document.getElementById('all-list').innerHTML =
      h.length ? h.map(card).join('') :
      '<div class="empty">No videos yet.</div>';

  } catch(e){
    document.getElementById('latest-cards').innerHTML =
      `<div class="empty">${e.message}<br><small style="color:#4a4a47;margin-top:6px;display:block">
      Enable GitHub Pages: Settings → Pages → main branch → /docs folder</small></div>`;
  }
}

loadStatus();
setInterval(loadStatus, 60000);
</script>
</body>
</html>
